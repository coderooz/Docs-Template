<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Docs Template</title>
  <meta
    name="description"
    content="Reusable project documentation template for product, library, service, and CLI repositories."
  />
  <meta
    name="keywords"
    content="documentation template, docs starter, project docs, developer documentation"
  />
  <meta name="theme-color" content="#0d0f14" />
  <link rel="manifest" href="./site.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./site-config.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="#top" aria-label="Go to top">
        <span class="brand-mark"></span>
        <span class="brand-copy">
          <strong id="brand-name">Docs Template</strong>
          <span id="brand-label">Reusable project docs</span>
        </span>
      </a>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <main id="top" class="layout">
      <section class="hero" id="hero"></section>

      <aside class="sidebar">
        <div class="sidebar-panel">
          <p class="sidebar-eyebrow">Navigate</p>
          <nav id="section-nav" class="section-nav" aria-label="Section navigation"></nav>
        </div>
        <div class="sidebar-panel">
          <p class="sidebar-eyebrow">External Links</p>
          <div id="link-list" class="link-list"></div>
        </div>
      </aside>

      <section id="content" class="content" aria-label="Documentation content"></section>
    </main>

    <footer class="footer" id="footer"></footer>
  </div>
</body>
</html>
