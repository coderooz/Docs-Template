name: Documentation improvement
description: Request a content, clarity, or structure improvement for the docs starter.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: section
    attributes:
      label: Affected section
      description: Which part of the template or README needs work?
      placeholder: n.md -> Common Workflows
    validations:
      required: true
  - type: textarea
    id: current_problem
    attributes:
      label: Current problem
      description: Explain what is confusing, missing, or outdated.
    validations:
      required: true
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested improvement
      description: Describe how the documentation should be improved.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Add examples, links, or comparable documentation if relevant.
